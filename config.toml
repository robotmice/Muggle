[llm]
provider = "deepseek"
model = "deepseek-chat"
temperature = 0.7

[server]
host = "0.0.0.0"
port = 5001
debug = true

[prompts]
path = "muggle.infra.prompts"

[vector_store]
collection_name = "aia_faq"
embedding_model = "text-embedding-v3"
top_k = 3

[rerank]
top_n = 3
relevance_threshold = 0.5
recall_limit = 15

[memory]
max_tokens = 1024
max_tokens_before_summary = 4096
max_summary_tokens = 256
